version: "3.8"

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_BACKEND_URL: "http://backend:4000" # URL для фронтенда
    depends_on:
      - backend
    networks:
      - llapp-network
    ports:
      - "8082:80"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=production
    networks:
      - llapp-network
    ports:
      - "4000:4000"

  nginx:
    image: nginx:1.25-alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - llapp-network
    ports:
      - "80:80"

networks:
  llapp-network:
    driver: bridge
